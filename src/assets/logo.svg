<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Brand blue-to-purple gradient for the 'K' -->
    <linearGradient id="ak-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Metallic/pearlescent metallic fade for the 'A' -->
    <linearGradient id="a-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
  </defs>

  <g transform="translate(0, 0)">
    <!-- K Arms (Gradient) - Drawn first so they emerge dynamically from behind the A -->
    <path 
      d="M 78 22 L 50 50 L 78 78" 
      fill="none" 
      stroke="url(#ak-gradient)" 
      stroke-width="12" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- A Body (White/Silver Gradient) -->
    <!-- The right leg of the 'A' perfectly doubles as the vertical stem of the 'K' -->
    <path 
      d="M 22 78 L 50 22 L 50 78" 
      fill="none" 
      stroke="url(#a-gradient)" 
      stroke-width="12" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- A Crossbar (White/Silver Gradient) -->
    <path 
      d="M 36 50 L 50 50" 
      fill="none" 
      stroke="url(#a-gradient)" 
      stroke-width="12" 
      stroke-linecap="round" 
    />
  </g>
</svg>
